wyciszenieonn:
  alias: Mute OnnTvBox
  sequence:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ is_state_attr(''media_player.android_tv_192_168_1_22'',
          ''is_volume_muted'', true) }}'
      sequence:
      - data:
          is_volume_muted: false
        action: media_player.volume_mute
        target:
          device_id: 7226f200b803090f770aceb04010e689
    default:
    - data:
        is_volume_muted: true
      action: media_player.volume_mute
      target:
        device_id: 7226f200b803090f770aceb04010e689
  description: ''
