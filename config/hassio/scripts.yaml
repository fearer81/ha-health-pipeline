lgtv_picture_mode:
  alias: LG TV Picture Mode
  description: ''
  mode: single
  sequence:
  - action: webostv.command
    data:
      entity_id: media_player.lg_tv
      command: system.notifications/createAlert
      payload:
        message: 'Ustawiono tryb obrazu: {{ picture_mode }}'
        modal: false
        buttons:
        - label: ok
          focus: true
          buttonType: ok
          onClick: luna://com.webos.settingsservice/setSystemSettings
          params:
            category: picture
            settings:
              pictureMode: '{{ picture_mode }}'
        type: confirm
        isSysReq: true
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ picture_mode | lower == ''filmmaker'' }}'
      sequence:
      - delay:
          milliseconds: 6
  - delay:
      hours: 0
      minutes: 0
      seconds: 0
      milliseconds: 200
  - action: webostv.button
    data:
      entity_id: media_player.lg_tv
      button: ENTER
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ picture_mode | lower == ''filmmaker'' }}'
      sequence:
      - delay:
          hours: 0
          minutes: 0
          seconds: 0
          milliseconds: 200
      - action: webostv.command
        data:
          entity_id: media_player.lg_tv
          command: system.notifications/createAlert
          payload:
            message: Eye Comfort OFF
            modal: false
            buttons:
            - label: ok
              focus: true
              buttonType: ok
              onClick: luna://com.webos.settingsservice/setSystemSettings
              params:
                category: picture
                settings:
                  eyeComfortMode: 'off'
            type: confirm
            isSysReq: true
      - delay:
          hours: 0
          minutes: 0
          seconds: 0
          milliseconds: 200
      - action: webostv.button
        data:
          entity_id: media_player.lg_tv
          button: ENTER
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ picture_mode | lower in [''expert1'',''expert2''] }}

          '
      sequence:
      - delay:
          hours: 0
          minutes: 0
          seconds: 0
          milliseconds: 200
      - action: webostv.command
        data:
          entity_id: media_player.lg_tv
          command: system.notifications/createAlert
          payload:
            message: Eye Comfort ON
            modal: false
            buttons:
            - label: ok
              focus: true
              buttonType: ok
              onClick: luna://com.webos.settingsservice/setSystemSettings
              params:
                category: picture
                settings:
                  eyeComfortMode: 'on'
            type: confirm
            isSysReq: true
      - delay:
          hours: 0
          minutes: 0
          seconds: 0
          milliseconds: 200
      - action: webostv.button
        data:
          entity_id: media_player.lg_tv
          button: ENTER
