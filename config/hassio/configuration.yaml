# NOWA KONFIGURACJA SZABLONÓW (Modern Format)
template:
  - sensor:
      # Moc W
      - name: PGE Moc
        unique_id: pge_all_moc
        icon: mdi:flash
        device_class: power
        unit_of_measurement: "W"
        state_class: measurement
        state: >
          {{ (
            states('sensor.pge_pc_power') | float(0) +
            states('sensor.pge_tv_power') | float(0) +
            states('sensor.pge1_power') | float(0) +
            states('sensor.pge2_power') | float(0) +
            states('sensor.pge3_power') | float(0) +
            states('sensor.pge_pralka_power') | float(0)
          ) | round(0) }}
          
  - sensor:
      - name: PGE Monthly
        unique_id: pge_monthly_sum
        device_class: energy
        unit_of_measurement: "kWh"
        state_class: total_increasing
        state: >
          {{ (
            states('sensor.pge_pc_monthly') | float(0) +
            states('sensor.pge_tv_monthly') | float(0) +
            states('sensor.pge1_monthly') | float(0) +
            states('sensor.pge2_monthly') | float(0) +
            states('sensor.pge3_monthly') | float(0) +
            states('sensor.pge_pralka_monthly') | float(0)
          ) | round(3) }}          

      # G12 boolean - stawka dzienna i nocna
      - name: PGE_LT G12
        unique_id: pge_lt_g12
        availability: "{{ not is_state('sensor.pge_lt_g12', 'unavailable') }}"
        state: >
          {%- set energy = {
            'peak1_start': 6,
            'peak1_stop': 13,
            'peak2_start': 15,
            'peak2_stop': 22,
          } -%}
          {%- if (now().hour - energy.peak1_start >= 0) and (now().hour - energy.peak1_stop < 0) -%}
            True
          {%- elif (now().hour - energy.peak2_start >= 0) and (now().hour - energy.peak2_stop < 0) -%}
            True
          {%- else -%}
            False
          {%- endif %}

      # G12 bieżąca stawka dzienna lub nocna
      - name: PGE_LT G12 Price
        unique_id: pge_lt_g12_price
        availability: "{{ not is_state('sensor.pge_lt_g12_price', 'unavailable') }}"
        device_class: monetary
        unit_of_measurement: "PLN/kWh"
        state: >
          {%- set fixed = 0.0927 -%}
          {%- if is_state('sensor.pge_lt_g12', 'True') -%}
             {{ (1.1945 + fixed) | round(4) }}
          {%- else -%}
            {{ (0.7273 + fixed) | round(4) }}
          {%- endif -%}

  - fan:
      - name: Wiatrak (4 biegi)
        unique_id: wiatrak_4_biegi_template
        speed_count: 4
        preset_modes:
          - "Natural Wind"
          - "Straight Wind"
        state: "{{ states('fan.dmaker_p5_cfdc_fan') }}"
        oscillating: "{{ state_attr('fan.dmaker_p5_cfdc_fan', 'oscillating') | default(false) }}"
        preset_mode: "{{ state_attr('fan.dmaker_p5_cfdc_fan', 'preset_mode') }}"
        percentage: >
          {% if is_state('fan.dmaker_p5_cfdc_fan','off') %} 0
          {% else %}
            {% set p = state_attr('fan.dmaker_p5_cfdc_fan','percentage')|int(0) %}
            {% if p <= 0 %} 0
            {% elif p <= 34 %} 25
            {% elif p <= 69 %} 50
            {% elif p <= 99 %} 75
            {% else %} 100
            {% endif %}
          {% endif %}
        turn_on:
          action: fan.turn_on
          data:
            entity_id: fan.dmaker_p5_cfdc_fan
        turn_off:
          action: fan.turn_off
          data:
            entity_id: fan.dmaker_p5_cfdc_fan
        set_oscillating:
          action: fan.oscillate
          data:
            entity_id: fan.dmaker_p5_cfdc_fan
            oscillating: "{{ oscillating }}"
        set_preset_mode:
          action: fan.set_preset_mode
          data:
            entity_id: fan.dmaker_p5_cfdc_fan
            preset_mode: "{{ preset_mode }}"
        set_percentage:
          action: fan.set_percentage
          data:
            entity_id: fan.dmaker_p5_cfdc_fan
            percentage: >
              {% set p = percentage|int(0) %}
              {% if p <= 0 %} 0
              {% elif p <= 25 %} 1
              {% elif p <= 50 %} 35
              {% elif p <= 75 %} 70
              {% else %} 100
              {% endif %}

# 1. VPN -> Lista wyboru (Helper)
input_boolean:
  vpn_sync_active:
    name: "Blokada aktualizacji listy VPN"
    initial: off
    
input_select:
  vpn_countries:
    name: "Wybierz Kraj VPN"
    options:
      - "Pobieranie listy..."
    icon: mdi:map-marker-radius

# 2. VPN -> Polecenia SSH
shell_command:
  # Pobiera nazwy plików bez rozszerzenia .conf
  fetch_vpn_list: "ssh -p 3022 -i /config/.ssh/id_rsa -o StrictHostKeyChecking=no root@192.168.1.1 'ls -1 /root/vpn-configs/*.conf | xargs -n 1 basename | sed \"s/.conf//\"'"
  # Odpala skrypt z wybranym krajem
  apply_vpn_config: "ssh -p 3022 -i /config/.ssh/id_rsa -o StrictHostKeyChecking=no root@192.168.1.1 '/root/apply-vpn.sh /root/vpn-configs/{{ country }}.conf'"
  
