- id: mama_status_automation
  alias: MAMA STATUS
  description: Powiadomienia o wejściu i wyjściu Mamy do/z stref Ciocia, Home i Okolica2
  triggers:
  - entity_id: device_tracker.xiaomianna
    zone: zone.ciocia
    event: enter
    id: enter_ciocia
    trigger: zone
  - entity_id: device_tracker.xiaomianna
    zone: zone.ciocia
    event: leave
    id: leave_ciocia
    trigger: zone
  - entity_id: device_tracker.xiaomianna
    zone: zone.okolica2
    event: enter
    id: enter_okolica2
    trigger: zone
  - entity_id: device_tracker.xiaomianna
    zone: zone.home
    event: leave
    id: leave_home
    trigger: zone
  conditions:
  - condition: template
    value_template: '{% set acc = state_attr(''device_tracker.xiaomianna'', ''gps_accuracy'')
      %} {{ acc is not none and acc < 30 }}'
    enabled: true
  actions:
  - variables:
      zone_name: '{{ trigger.zone.attributes.friendly_name }}'
      action_type: '{{ ''IN'' if trigger.event == ''enter'' else ''OUT'' }}'
      title: ' '
      message: "\U0001F4CDMAMA {{ action_type }} {{ zone_name }}. {{ states('sensor.xiaomianna_geocoded_location')
        }}"
  - choose:
    - conditions:
      - condition: trigger
        id:
        - enter_ciocia
        - leave_ciocia
        - leave_home
      sequence:
      - delay: '{{ ''00:00:02'' if trigger.event == ''leave'' else ''00:00:00'' }}'
      - data:
          title: ' '
          message: ' {{ message }} '
          data:
            tag: MAMA STATUS
            ttl: 0
            priority: high
        action: notify.mobile_app_xiaomihmi15
      - data:
          title: ' '
          message: ' {{ message }} '
        action: notify.html5
    - conditions:
      - condition: trigger
        id: enter_okolica2
      sequence:
      - data:
          title: ' '
          message: ' {{ message }} '
          data:
            tag: MAMA STATUS
            ttl: 0
            priority: high
        action: notify.mobile_app_xiaomihmi15
      - data:
          title: ' '
          message: ' {{ message }} '
        action: notify.html5
      - target:
          entity_id:
          - automation.test_lokalizacja_leave
          - automation.home_alone_kuchnia_salon_lazienka_przedpokoj_off
        data:
          stop_actions: true
        action: automation.turn_off
        enabled: true
  mode: single
