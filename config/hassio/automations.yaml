- id: '1727207087145'
  alias: Home Alone - Arrive i Leave
  description: 'Stabilna automatyzacja z krótszymi czasami, bez błędnej logiki last_changed.

    '
  triggers:
  - entity_id:
    - device_tracker.xiaomihmi15
    to:
    - home
    for:
      hours: 0
      minutes: 1
      seconds: 0
    id: arrive
    trigger: state
    from:
    - not_home
  - entity_id:
    - device_tracker.xiaomihmi15
    from:
    - home
    to:
    - not_home
    for:
      hours: 0
      minutes: 5
      seconds: 0
    id: leave
    trigger: state
  conditions: []
  actions:
  - choose:
    - conditions:
      - condition: trigger
        id: arrive
      - condition: time
        after: '19:55:00'
        before: '23:30:00'
      - condition: template
        value_template: "{% set last = states('input_datetime.last_leave_home') %}
          {% if last in ('unknown','unavailable','') %}\n  false\n{% else %}\n  {{
          (as_timestamp(now()) - as_timestamp(last)) > 1800 }}\n{% endif %}\n"
      sequence:
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.leave_locked
      - action: notify.mobile_app_xiaomihmi15
        data:
          title: Arrive - Włącz Przedpokój 1 i Pokój
          message: ' '
          data:
            tag: arrive_home
            ttl: 0
            priority: high
      - action: switch.turn_on
        target:
          device_id:
          - 1ff9b911c0d913696269646267fc72f8
          - d36e7b1056abfdb139090057df440135
      - device_id: 82d438cb58cfac2ce0769bed5bbaa7bf
        domain: button
        entity_id: 6845bf109e857b8f1a442f48e047238b
        type: press
    - conditions:
      - condition: trigger
        id: leave
      - condition: state
        entity_id: input_boolean.leave_locked
        state: 'off'
      sequence:
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.leave_locked
      - action: input_datetime.set_datetime
        target:
