- id: przedpokoj1_manual_sync
  alias: Przedpokój1 ON OFF Manual
  description: Po ręcznym naciśnięciu włącznika synchronizuje drugi (grupa) oraz ustawia
    flagę manual.
  triggers:
  - entity_id:
    - switch.przedpokoj1
    - switch.przedpokoj1b
    to:
    - 'on'
    - 'off'
    trigger: state
  conditions:
  - condition: template
    value_template: "{{ trigger.to_state is not none\n   and trigger.to_state.state
      in ['on','off']\n   and (trigger.from_state is none or trigger.to_state.state
      != trigger.from_state.state)\n   and (\n        trigger.to_state.context.parent_id
      is none\n        or trigger.to_state.context.parent_id != this.context.id\n
      \     )\n   and not (\n        expand(state_attr('switch.przedpokoj1_1b', 'entity_id'))\n
      \       | selectattr('state', 'ne', trigger.to_state.state)\n        | list\n
      \       | length == 0\n      )\n}}\n"
  actions:
  - alias: Zmienne pomocnicze
    variables:
      desired: '{{ trigger.to_state.state }}'
      members: '{{ state_attr(''switch.przedpokoj1_1b'', ''entity_id'') }}'
  - alias: Wymuś stan na grupie
    action: switch.turn_{{ desired }}
    target:
      entity_id: switch.przedpokoj1_1b
  - alias: Czekaj na potwierdzenie stanu
    wait_template: "{{ expand(members)\n   | selectattr('state','eq', desired)\n   |
      list\n   | length == (members | count) }}\n"
    timeout: 00:00:01
    continue_on_timeout: true
  - alias: Retry gdy brak potwierdzenia
    choose:
    - conditions:
      - condition: template
        value_template: "{{ expand(members)\n   | selectattr('state','ne', desired)\n
          \  | list\n   | length > 0 }}\n"
      sequence:
      - action: switch.turn_{{ desired }}
        target:
          entity_id: switch.przedpokoj1_1b
      - wait_template: "{{ expand(members)\n   | selectattr('state','eq', desired)\n
          \  | list\n   | length == (members | count) }}\n"
        timeout: 00:00:01
        continue_on_timeout: true
  - alias: Ustaw flagę manual zgodnie ze stanem
    action: input_boolean.turn_{{ desired }}
    target:
      entity_id: input_boolean.przedpokoj1_manual
  mode: queued
  max_exceeded: silent
