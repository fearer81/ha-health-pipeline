- id: lazienka_sync_switch_group
  alias: Łazienka 1-3 ON OFF
  triggers:
  - entity_id:
    - switch.lazienka1
    - switch.lazienka3
    to:
    - 'on'
    - 'off'
    trigger: state
  conditions:
  - condition: template
    value_template: "{{ trigger.to_state is not none\n   and trigger.to_state.state
      in ['on','off']\n   and (trigger.from_state is none or trigger.to_state.state
      != trigger.from_state.state)\n   and (\n        trigger.to_state.context.parent_id
      is none\n        or trigger.to_state.context.parent_id != this.context.id\n
      \      )\n   and not (\n        expand(state_attr('switch.lazienka_1_3', 'entity_id'))\n
      \       | selectattr('state', 'ne', trigger.to_state.state)\n        | list\n
      \       | length == 0\n       )\n}}\n"
  actions:
  - alias: Zmienne pomocnicze
    variables:
      desired: '{{ trigger.to_state.state }}'
      members: '{{ state_attr(''switch.lazienka_1_3'',''entity_id'') }}'
  - alias: Ustaw stan grupy przełączników
    action: switch.turn_{{ desired }}
    target:
      entity_id: switch.lazienka_1_3
  - alias: Czekaj aż wszystkie członki dogonią
    wait_template: "{{ expand(members)\n   | selectattr('state','eq', desired)\n   |
      list\n   | length == (members | count) }}\n"
    timeout: 00:00:0020
    continue_on_timeout: true
    enabled: false
  - alias: Retry gdy coś nie doszło
    choose:
    - conditions:
      - condition: template
        value_template: "{{ expand(members)\n   | selectattr('state','ne', desired)\n
          \  | list\n   | length > 0 }}\n"
      sequence:
      - action: switch.turn_{{ desired }}
        target:
          entity_id: switch.lazienka_1_3
  mode: queued
  max_exceeded: silent
- id: mama_location_change
  alias: MAMA LOCATION CHANGE
  description: Wysyła powiadomienie, gdy lokalizacja Mamy zmieni się o więcej niż
    100 metrów
  triggers:
  - entity_id: device_tracker.xiaomianna
    trigger: state
  actions:
  - variables:
      old_lat: '{{ trigger.from_state.attributes.latitude }}'
      old_lon: '{{ trigger.from_state.attributes.longitude }}'
      new_lat: '{{ trigger.to_state.attributes.latitude }}'
      new_lon: '{{ trigger.to_state.attributes.longitude }}'
      is_data_valid: "{{ old_lat is not none and old_lon is not none and\n   new_lat
        is not none and new_lon is not none }}"
  - condition: template
    value_template: "{# Sprawdzamy najpierw, czy mamy wszystkie koordynaty, a potem
      liczymy dystans #} {% if is_data_valid %}\n  {{ distance(old_lat, old_lon, new_lat,
      new_lon) > 0.1}}\n{% else %}\n  false\n{% endif %}"
  - data:
      data:
        tag: MAMA LOCATION CHANGE
        ttl: 0
        priority: high
      message: "\U0001F4CDMAMA LOCATION CHANGE  {{ states('sensor.xiaomianna_geocoded_location')
        }}"
    action: notify.mobile_app_xiaomihmi15
  - enabled: true
    data:
      message: MAMA LOCATION CHANGE {{ states('sensor.xiaomianna_geocoded_location')
        }}
    action: notify.html5
  mode: single
