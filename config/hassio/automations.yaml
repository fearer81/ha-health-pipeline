- id: vpn_sync_file_list
  alias: 'VPN: Synchronizuj listę plików'
  triggers:
  - trigger: homeassistant
    event: start
  - trigger: time_pattern
    hours: /23
  actions:
  - action: input_boolean.turn_on
    target:
      entity_id: input_boolean.vpn_sync_active
  - action: shell_command.fetch_vpn_list
    response_variable: raw_list
  - action: input_select.set_options
    target:
      entity_id: input_select.vpn_countries
    data:
      options: "{% if raw_list is defined and raw_list['stdout'] is defined %}\n  {%
        set files = raw_list['stdout'].split('\\n') | map('trim') | select('ne', '')
        | list %}\n  {{ files if files | length > 0 else ['Brak plików'] }}\n{% else
        %}\n  ['Błąd połączenia SSH']\n{% endif %}"
  - delay: 00:00:05
  - action: input_boolean.turn_off
    target:
      entity_id: input_boolean.vpn_sync_active
- id: vpn_auto_apply_country
  alias: 'VPN: Auto-zastosuj kraj po wyborze'
  triggers:
  - entity_id: input_select.vpn_countries
    trigger: state
  conditions:
  - condition: state
    entity_id: input_boolean.vpn_sync_active
    state: 'off'
  - condition: template
    value_template: '{{ trigger.from_state is not none and trigger.from_state.state
      != trigger.to_state.state }}'
  - condition: template
    value_template: '{{ states(''input_select.vpn_countries'') not in [''Pobieranie
      listy...'', ''Brak plików .conf'', ''unknown'', ''unavailable''] }}'
  actions:
  - data:
      country: '{{ states(''input_select.vpn_countries'') }}'
    action: shell_command.apply_vpn_config
