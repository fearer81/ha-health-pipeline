lgtv_picture_mode:
  alias: LG TV Picture Mode
  description: ''
  mode: single
  sequence:
  - data:
      entity_id: media_player.lg_tv
      command: system.notifications/createAlert
      payload:
        message: 'Ustawiono tryb obrazu: {{ picture_mode }}   (2sek) '
        modal: false
        buttons:
        - label: ok
          focus: true
          buttonType: ok
          onClick: luna://com.webos.settingsservice/setSystemSettings
          params:
            category: picture
            settings:
              pictureMode: '{{ picture_mode }}'
        type: confirm
        isSysReq: true
    action: webostv.command
  - delay:
      hours: 0
      minutes: 0
      seconds: 0
      milliseconds: 1
    enabled: false
  - data:
      entity_id: media_player.lg_tv
      button: ENTER
    action: webostv.button
empty_log:
  alias: Clear log HA
  sequence:
  - service: shell_command.clear_log
lgtv_script:
  alias: LGTV_Script
  description: ''
  sequence:
  - target:
      entity_id: button.lgtv
    action: button.press
    data: {}
  - delay:
      seconds: 5
    enabled: false
  - data:
      entity_id: media_player.lg_tv
      source: Live TV
    action: media_player.select_source
    enabled: false
  - data:
      entity_id: media_player.lg_tv
      command: system.launcher/launch
      payload:
        id: com.webos.app.home
    action: webostv.command
    enabled: false
