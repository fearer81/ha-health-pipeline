lg_tv_wylacz_ekran:
  alias: LG TV OFF Screen
  description: ''
  mode: single
  sequence:
  - delay:
      hours: 0
      minutes: 0
      seconds: 1
      milliseconds: 0
    enabled: false
  - data:
      entity_id: media_player.lg_tv
      command: system.notifications/createToast
      payload:
        message: Ekran wyłączy się za 2 sekundy
    action: webostv.command
  - delay:
      hours: 0
      minutes: 0
      seconds: 2
      milliseconds: 0
  - data:
      entity_id: media_player.lg_tv
      command: com.webos.service.tvpower/power/turnOffScreen
    action: webostv.command
wyciszenieonn:
  alias: Mute OnnTvBox
  sequence:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ is_state_attr(''media_player.android_tv_192_168_1_22'',
          ''is_volume_muted'', true) }}'
      sequence:
      - data:
          is_volume_muted: false
        action: media_player.volume_mute
        target:
          device_id: 7226f200b803090f770aceb04010e689
    default:
    - data:
        is_volume_muted: true
      action: media_player.volume_mute
      target:
        device_id: 7226f200b803090f770aceb04010e689
  description: ''
